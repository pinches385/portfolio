<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Mode Toggle</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* DARK MODE STYLES */
    body.dark-mode {
      background-color: #121212;
      color: white;
    }

    body.dark-mode p,
    body.dark-mode a,
    body.dark-mode .project-title {
      color: white;
    }

    body.dark-mode .details-container,
    body.dark-mode .color-container,
    body.dark-mode .contact-info-upper-container {
      background: #1e1e1e;
      border-color: #444;
    }

    body.dark-mode nav a:hover {
      color: lightgray;
      text-decoration-color: #ccc;
    }

    /* Toggle Switch */
    .dark-mode-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2196f3;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="logo-container">
      <img src="logo.png" class="logo-img" alt="Logo" />
      <div class="logo">MySite</div>
    </div>

    <ul class="nav-links">
      <li><a href="#profile">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

    <div class="dark-mode-toggle">
      <label class="switch">
        <input type="checkbox" id="darkModeSwitch" />
        <span class="slider"></span>
      </label>
    </div>
  </nav>

  <!-- Hamburger Nav -->
  <div id="hamburger-nav">
    <div class="hamburger-menu">
      <div class="hamburger-icon" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="menu-links">
        <li><a href="#profile" onclick="toggleMenu()">Home</a></li>
        <li><a href="#about" onclick="toggleMenu()">About</a></li>
        <li><a href="#experience" onclick="toggleMenu()">Experience</a></li>
        <li><a href="#projects" onclick="toggleMenu()">Projects</a></li>
        <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
      </div>
    </div>
  </div>

  <!-- Sections (keep your existing sections here like #profile, #about, etc.) -->

  <!-- Footer -->
  <footer>
    <p>© 2025 Peter. All rights reserved.</p>
  </footer>

  <script>
    function toggleMenu() {
      const menu = document.querySelector(".menu-links");
      const icon = document.querySelector(".hamburger-icon");
      menu.classList.toggle("open");
      icon.classList.toggle("open");
    }

    document.getElementById("darkModeSwitch").addEventListener("change", function () {
      document.body.classList.toggle("dark-mode");
    });
  </script>
</body>
</html>
